<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Health Recorder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5">
                <!-- Logo -->
                <div class="text-center mb-4">
                    <a href="index.html" class="navbar-brand fw-bold fs-3">
                        <i class="fas fa-heartbeat text-primary me-2"></i>Health Recorder
                    </a>
                </div>

                <!-- Login Card -->
                <div class="auth-card">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4">Welcome Back</h2>
                        <p class="text-center text-muted mb-4">Sign in to access your health records</p>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-envelope"></i>
                                    </span>
                                    <input type="email" class="form-control" id="email" 
                                           placeholder="you@example.com" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-lock"></i>
                                    </span>
                                    <input type="password" class="form-control" id="password" 
                                           placeholder="Enter your password" required>
                                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <div class="mb-3 form-check d-flex justify-content-between">
                                <div>
                                    <input type="checkbox" class="form-check-input" id="remember">
                                    <label class="form-check-label" for="remember">Remember me</label>
                                </div>
                                <a href="#" class="text-decoration-none">Forgot password?</a>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 mb-3" id="loginBtn">
                                <i class="fas fa-sign-in-alt me-2"></i>Sign In
                            </button>
                            
                            <div class="text-center mb-3">
                                <span class="text-muted">Or continue with</span>
                            </div>
                            
                            <div class="d-grid gap-2 mb-3">
                                <button type="button" class="btn btn-outline-secondary" id="googleLoginBtn">
                                    <i class="fab fa-google me-2"></i>Google
                                </button>
                            </div>
                            
                            <div class="text-center">
                                <p class="mb-0">Don't have an account? 
                                    <a href="register3.html" class="text-decoration-none">Sign up</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
                
                <!-- Demo Credentials -->
                <div class="demo-credentials mt-4 p-3 bg-light rounded">
                    <p class="mb-1"><strong>Demo Account:</strong></p>
                    <p class="mb-1">Email: demo@healthrecorder.com</p>
                    <p class="mb-0">Password: demo123</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { loginUser, loginWithGoogle, redirectIfAuthenticated } from './auth-supabase.js';
        import { showToast } from './utils.js';

        redirectIfAuthenticated('/dashboard4.html');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const orig = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in...';

            const result = await loginUser(email, password);
            if (result.success) {
                showToast(result.message, 'success');
                setTimeout(() => { window.location.href = '/dashboard4.html'; }, 800);
            } else {
                showToast(result.message, 'error');
                btn.disabled = false;
                btn.innerHTML = orig;
            }
        });

        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            const btn = document.getElementById('googleLoginBtn');
            const orig = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Connecting...';

            const result = await loginWithGoogle();
            if (result.success) {
                showToast(result.message, 'success');
                setTimeout(() => { window.location.href = '/dashboard4.html'; }, 800);
            } else {
                showToast(result.message, 'error');
                btn.disabled = false;
                btn.innerHTML = orig;
            }
        });
    </script>
</body>
</html>
